<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 4_IS</title>
    <style>
      table,
      th,
      tr,
      td {
        border: 1px solid black;
        border-collapse: collapse;
        padding: 30px;
      }
    </style>
  </head>
  <body>
    <form action="#">
      <h3>Employee Form</h3>
      First Name :- <input type="text" placeholder="Type here..." />
      <br />
      Last Name :- <input type="text" placeholder="Type here..." />
      <br />
      Address :-
      <textarea
        name="Address"
        rows="4"
        cols="30"
        placeholder="Type Address..."
      ></textarea>
      <br />
      <button>Submit</button>
    </form>

    <br />
    <table>
      <caption>
        <h3>Employees Data</h3>
      </caption>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Age</th>
        <th>Occupation</th>
      </tr>
      <tr>
        <td>Sania</td>
        <td>Sharma</td>
        <td>23</td>
        <td>Fullstack Developer</td>
      </tr>
      <tr>
        <td>Sophie</td>
        <td>Gomez</td>
        <td>24</td>
        <td>Database Analyst</td>
      </tr>
      <tr>
        <td>John</td>
        <td>Lewis</td>
        <td>26</td>
        <td>Frontend Developer</td>
      </tr>
    </table>
  </body>
</html>
